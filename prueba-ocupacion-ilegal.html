<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba Final – Régimen Jurídico de la Ocupación Ilegal</title>
  <style>
    :root {
      --primary: #c8102e; --primary-dark: #a00d25;
      --line: #d0ccc7; --text: #1a1a1a; --muted: #5f5f5f;
      --surface: #fff; --surface-alt: #f5f3f0;
      --radius: 10px; --shadow: 0 6px 24px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #f0ede8; color: var(--text); font-size: 15px; line-height: 1.5; }
    .page { width: min(900px, calc(100% - 32px)); margin: 24px auto; display: grid; gap: 18px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; border-bottom: 3px solid var(--primary); }
    .header img { max-height: 80px; max-width: 180px; object-fit: contain; }
    .header-center { text-align: center; flex: 1; }
    .header-center h1 { font-size: 1rem; font-weight: 700; text-transform: uppercase; color: var(--primary); line-height: 1.35; }
    .datos { padding: 20px 24px; }
    .datos h2, .questions-wrap h2 { font-size: 0.85rem; font-weight: 700; margin-bottom: 14px; color: var(--primary-dark); letter-spacing: 0.04em; text-transform: uppercase; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: var(--muted); }
    .field input { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 8px; font-size: 0.9rem; background: #faf9f7; transition: border-color .2s; }
    .field input:focus { outline: none; border-color: var(--primary); }
    .field input.error { border-color: #c0392b; background: #fff5f5; }
    .field .err-msg { font-size: 0.73rem; color: #c0392b; margin-top: 4px; display: none; }
    .field .err-msg.show { display: block; }
    .layout { display: grid; grid-template-columns: 1fr 260px; gap: 18px; align-items: start; }
    .questions-wrap { padding: 20px 24px; display: grid; gap: 14px; }
    .question { border: 1px solid var(--line); border-radius: 8px; padding: 13px 15px; background: var(--surface-alt); }
    .question-top { display: flex; justify-content: space-between; align-items: start; gap: 10px; margin-bottom: 10px; }
    .question-text { font-weight: 600; font-size: 0.9rem; flex: 1; }
    .pill { font-size: 0.75rem; font-weight: 700; background: #f4d0d7; color: var(--primary-dark); padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
    .options { display: grid; gap: 7px; }
    .option { display: flex; gap: 9px; align-items: start; padding: 8px 10px; border: 1px solid var(--line); border-radius: 7px; background: #fff; cursor: pointer; transition: border-color .15s, background .15s; }
    .option:hover { border-color: var(--primary); background: #fdf0f2; }
    .option input { margin-top: 3px; accent-color: var(--primary); }
    .sidebar { padding: 16px; display: grid; gap: 12px; position: sticky; top: 18px; }
    .sidebar h2 { font-size: 0.85rem; font-weight: 700; color: var(--primary-dark); text-transform: uppercase; }
    .progress-box { background: var(--surface-alt); border: 1px solid var(--line); border-radius: 8px; padding: 11px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 7px; }
    .progress-bar-wrap { height: 9px; border-radius: 999px; background: #e0d9d2; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width .2s; }
    button { width: 100%; border: 0; border-radius: 8px; padding: 11px; font-weight: 700; font-size: 0.9rem; cursor: pointer; min-height: 42px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-primary:disabled { background: #c0b5b5; cursor: not-allowed; }
    .btn-secondary { background: #ede8e2; color: var(--text); border: 1px solid var(--line); margin-top: 6px; }
    .result { display: none; padding: 20px 24px; }
    .result.visible { display: block; }
    .result-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--line); padding-bottom: 10px; margin-bottom: 12px; gap: 14px; }
    .result-header h1 { font-size: 0.95rem; color: var(--primary); text-transform: uppercase; }
    .score-box { background: #f9eaed; border: 1px solid #e8b4be; border-radius: 10px; padding: 9px 14px; text-align: center; min-width: 100px; }
    .score-box strong { display: block; font-size: 1.7rem; color: var(--primary); line-height: 1; }
    .alumno-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 12px; }
    .alumno-grid div { background: #f5f3f0; border: 1px solid var(--line); border-radius: 7px; padding: 6px 9px; font-size: 0.8rem; }
    .alumno-grid div strong { display: block; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 1px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th, td { border: 1px solid var(--line); padding: 6px 8px; vertical-align: top; text-align: left; }
    th { background: #f2eee8; font-size: 0.75rem; font-weight: 700; }
    .tag-ok { display:inline-block; background:#d4edda; color:#1a5c2a; border-radius:999px; padding:2px 7px; font-weight:700; font-size:0.73rem; }
    .tag-ko { display:inline-block; background:#f8d7da; color:#7a1a26; border-radius:999px; padding:2px 7px; font-weight:700; font-size:0.73rem; }
    .tag-na { display:inline-block; background:#fff3cd; color:#6b4700; border-radius:999px; padding:2px 7px; font-weight:700; font-size:0.73rem; }
    .print-tools { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }
    .print-tools button { width:auto; padding:10px 18px; }
    .footer-print { margin-top:12px; display:flex; justify-content:space-between; color:var(--muted); font-size:0.75rem; flex-wrap:wrap; gap:8px; }
    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .form-grid { grid-template-columns: 1fr; }
      .alumno-grid { grid-template-columns: 1fr 1fr; }
    }
    @media print {
      @page { size: A4; margin: 10mm; }
      body { background: #fff; }
      .page { width: 100%; margin: 0; gap: 0; }
      .layout, .sidebar, .card:not(.result) { display: none !important; }
      .result { display: block !important; padding: 0; border: 0; box-shadow: none; font-size: 8.5px; }
      .result-header { padding-bottom: 5px; margin-bottom: 7px; }
      .result-header h1 { font-size: 0.8rem; }
      .score-box strong { font-size: 1.1rem; }
      .score-box { padding: 4px 9px; min-width: 75px; }
      .alumno-grid { gap: 4px; margin-bottom: 7px; }
      .alumno-grid div { padding: 4px 6px; }
      th, td { padding: 3px 5px; font-size: 7.8px; }
      .tag-ok, .tag-ko, .tag-na { padding: 1px 5px; font-size: 7px; }
      .print-tools { display: none !important; }
      .footer-print { margin-top: 7px; font-size: 7.5px; }
      tr { page-break-inside: avoid; }
    }
  </style>
</head>

  const rawQuiz = [
    {q:"\u00bfEn qu\u00e9 porcentaje se han incrementado los delitos de ocupaci\u00f3n ilegal desde el inicio de la legislatura?", opts:["20%","50%","67%","80%"], k:"A4", p:1},
    {q:"\u00bfQu\u00e9 comunidad aut\u00f3noma tiene uno de los mayores \u00edndices de ocupaci\u00f3n ilegal?", opts:["Galicia","Madrid","Navarra","Asturias"], k:"B2", p:1},
    {q:"La flagrancia de un delito s\u00f3lo se produce si se supera un plazo de 48 horas.", opts:["Verdadero","Falso"], k:"C2", p:1},
    {q:"\u00bfQu\u00e9 se protege en el delito de allanamiento de morada seg\u00fan el apartado segundo del art\u00edculo 18 de la Constituci\u00f3n?", opts:["Derecho al honor","Derecho a la propiedad","Inviolabilidad del domicilio","Derecho a la defensa"], k:"D3", p:1},
    {q:"\u00bfQu\u00e9 elemento NO forma parte de los requisitos para hablar de ocupaci\u00f3n ilegal?", opts:["Inmueble ajeno","Consentimiento del propietario","\u00c1nimo de permanencia","Ausencia de t\u00edtulo justo"], k:"E2", p:1},

    {q:"Caso: Una familia est\u00e1 de vacaciones. Un vecino llama a la polic\u00eda al ver luces en la casa. \u00bfQu\u00e9 delito puede estarse cometiendo?", opts:["Usurpaci\u00f3n","Allanamiento de morada","Hurto","Ninguno"], k:"H2", p:1},
    {q:"Caso: Varios j\u00f3venes entran en una casa vac\u00eda los fines de semana para hacer fiestas. \u00bfQu\u00e9 elemento de la ocupaci\u00f3n falta para ser delito?", opts:["\u00c1nimo de permanencia","Violencia","T\u00edtulo justo","Intenci\u00f3n de robo"], k:"I1", p:1},

    {q:"En caso de ocupaci\u00f3n de una vivienda p\u00fablica, \u00bfqu\u00e9 procedimiento puede aplicarse?", opts:["Penal","Civil","Contencioso-administrativo","Todas las anteriores son correctas, aunque debe priorizarse la v\u00eda contencioso-administrativa sobre las anteriores"], k:"K4", p:1},
    {q:"\u00bfCu\u00e1l de los siguientes requisitos no forma parte del delito de usurpaci\u00f3n (atenuado)?", opts:["Falta de autorizaci\u00f3n","Ausencia de t\u00edtulo","Permanencia contra la voluntad del titular","Violencia"], k:"L4", p:1},
    {q:"De las solicitudes de autorizaci\u00f3n judicial de entrada en domicilio conocen\u2026", opts:["La Sala de lo Contencioso-Administrativo del Tribunal Superior de Justicia de Madrid","La Sala de lo Contencioso-Administrativo de la Audiencia Nacional","Los Juzgados de lo Contencioso-Administrativo (hoy, Secci\u00f3n de lo Contencioso-Administrativo del Tribunal de Instancia de Madrid)","Los Juzgados Centrales de lo Contencioso-Administrativo de Madrid"], k:"M2", p:1},
    {q:"En los expedientes de autorizaci\u00f3n judicial de entrada en domicilio\u2026", opts:["La Administraci\u00f3n est\u00e1 obligada a proporcionar una alternativa habitacional","No puede pedirse la ejecuci\u00f3n forzosa de una Resoluci\u00f3n denegatoria de regularizaci\u00f3n","Las dos son verdaderas","Las dos son falsas"], k:"N4", p:1},
    {q:"Cuando haya menores en la vivienda\u2026", opts:["En ning\u00fan caso se autoriza judicialmente la entrada en domicilio","De ellos se hace cargo la Comisi\u00f3n de Tutela del Menor","Deben de haberse previsto, como en cualquier caso, medidas precautorias suficientes y adecuadas"], k:"O1", p:1},
    {q:"El Auto de autorizaci\u00f3n judicial de entrada en domicilio\u2026", opts:["Es irrecurrible","Solo es susceptible de recurso de casaci\u00f3n a preparar en los 30 d\u00edas siguientes a su notificaci\u00f3n","Es susceptible de recurso de apelaci\u00f3n"], k:"P3", p:1}
  ];

const quizData = rawQuiz.map(({k, ...rest}) => rest);
  const answerMap = rawQuiz.map(item => Number(item.k.slice(1)) - 1);

  const container = document.getElementById('questionsContainer');
  const answeredEl = document.getElementById('answeredCount');
  const totalEl = document.getElementById('totalQ');
  const bar = document.getElementById('progressBar');
  const gradeBtn = document.getElementById('gradeBtn');
  const resetBtn = document.getElementById('resetBtn');
  const resultSection = document.getElementById('resultSection');

  totalEl.textContent = quizData.length;

  function escHTML(s) {
    return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
  }

  function renderQuestions() {
    const frag = document.createDocumentFragment();
    quizData.forEach((item, i) => {
      const art = document.createElement('article');
      art.className = 'question';
      art.innerHTML = `
        <div class="question-top">
          <span class="question-text">${i+1}. ${escHTML(item.q)}</span>
          <span class="pill">${item.p} pt</span>
        </div>
        <div class="options" role="radiogroup">
          ${item.opts.map((o,j) => `
            <label class="option">
              <input type="radio" name="q${i}" value="${j}">
              <span><strong>${String.fromCharCode(97+j)})</strong> ${escHTML(o)}</span>
            </label>`).join('')}
        </div>`;
      frag.appendChild(art);
    });
    container.appendChild(frag);
    container.addEventListener('change', updateProgress);
    updateProgress();
  }

  function getAnswers() {
    return quizData.map((_,i) => {
      const sel = document.querySelector(`input[name="q${i}"]:checked`);
      return sel ? Number(sel.value) : null;
    });
  }

  function updateProgress() {
    const done = getAnswers().filter(v => v !== null).length;
    answeredEl.textContent = done;
    bar.style.width = `${(done/quizData.length)*100}%`;
    gradeBtn.disabled = done !== quizData.length;
  }

  function validarDNI(dni) {
    const letters = 'TRWAGMYFPDXBNJZSQVHLCKE';
    if (!/^\d{8}[A-Za-z]$/.test(dni)) return false;
    return dni[8].toUpperCase() === letters[parseInt(dni.substring(0,8)) % 23];
  }

  function validarEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function validateForm() {
    const fields = [
      {id:'fNombre',     errId:'eNombre',     check: v => v.trim() !== ''},
      {id:'fApellidos',  errId:'eApellidos',  check: v => v.trim() !== ''},
      {id:'fDNI',        errId:'eDNI',        check: v => validarDNI(v.trim())},
      {id:'fEmail',      errId:'eEmail',      check: v => validarEmail(v.trim())},
      {id:'fUnidad',     errId:'eUnidad',     check: v => v.trim() !== ''},
      {id:'fConsejeria', errId:'eConsejeria', check: v => v.trim() !== ''},
    ];
    let ok = true;
    fields.forEach(f => {
      const input = document.getElementById(f.id);
      const err   = document.getElementById(f.errId);
      const valid = f.check(input.value);
      input.classList.toggle('error', !valid);
      err.classList.toggle('show', !valid);
      if (!valid) ok = false;
    });
    return ok;
  }

  gradeBtn.addEventListener('click', () => {
    if (!validateForm()) {
      document.getElementById('datosCard').scrollIntoView({behavior:'smooth'});
      return;
    }
    buildResult();
  });

  resetBtn.addEventListener('click', () => {
    document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
    resultSection.classList.remove('visible');
    resultSection.innerHTML = '';
    updateProgress();
    window.scrollTo({top:0, behavior:'smooth'});
  });

  function buildResult() {
    const answers = getAnswers();
    const nombre     = document.getElementById('fNombre').value.trim();
    const apellidos  = document.getElementById('fApellidos').value.trim();
    const dni        = document.getElementById('fDNI').value.trim().toUpperCase();
    const email      = document.getElementById('fEmail').value.trim();
    const unidad     = document.getElementById('fUnidad').value.trim();
    const consejeria = document.getElementById('fConsejeria').value.trim();
    const today      = new Date().toLocaleDateString('es-ES');
    const totalPts   = quizData.reduce((s,q) => s+q.p, 0);
    let earned = 0;

    const rows = quizData.map((item, i) => {
      const sel = answers[i];
      const correct = answerMap[i];
      const isOk = sel === correct;
      if (isOk) earned += item.p;
      const selText = sel === null ? '<span class="tag-na">Sin responder</span>'
        : `${String.fromCharCode(97+sel)}) ${escHTML(item.opts[sel])}`;
      const corrText = `${String.fromCharCode(97+correct)}) ${escHTML(item.opts[correct])}`;
      const tag = sel === null ? '<span class="tag-na">No evaluada</span>'
        : isOk ? '<span class="tag-ok">Correcta</span>' : '<span class="tag-ko">Incorrecta</span>';
      return `<tr>
        <td>${i+1}</td>
        <td>${escHTML(item.q)}</td>
        <td>${selText}</td>
        <td>${corrText}</td>
        <td>${tag}</td>
        <td style="text-align:center">${isOk?item.p:0}/${item.p}</td>
      </tr>`;
    }).join('');

    resultSection.innerHTML = `
      <div class="result-header">
        <div>
          <h1>Prueba Final – R\u00e9gimen Jur\u00eddico de la Ocupaci\u00f3n Ilegal</h1>
          <p style="color:var(--muted);font-size:0.78rem">Hoja de resultados generada el ${today}</p>
        </div>
        <div class="score-box">
          <span style="font-size:0.7rem;color:var(--muted)">PUNTUACI\u00d3N</span>
          <strong>${earned}/${totalPts}</strong>
        </div>
      </div>
      <div class="alumno-grid">
        <div><strong>Nombre</strong>${escHTML(nombre)}</div>
        <div><strong>Apellidos</strong>${escHTML(apellidos)}</div>
        <div><strong>DNI</strong>${escHTML(dni)}</div>
        <div><strong>Correo</strong>${escHTML(email)}</div>
        <div><strong>Unidad</strong>${escHTML(unidad)}</div>
        <div><strong>Consejer\u00eda</strong>${escHTML(consejeria)}</div>
      </div>
      <table>
        <thead>
          <tr><th>N\u00ba</th><th>Pregunta</th><th>Respuesta del alumno</th><th>Respuesta correcta</th><th>Resultado</th><th>Pts</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="print-tools">
        <button class="btn-primary" onclick="window.print()">Imprimir / Guardar PDF</button>
        <button class="btn-secondary" onclick="window.scrollTo({top:0,behavior:'smooth'})">Volver arriba</button>
      </div>
      <div class="footer-print">
        <span>Documento preparado para impresi\u00f3n A4</span>
        <span>Firma del alumno: ____________________</span>
      </div>`;

    resultSection.classList.add('visible');
    resultSection.scrollIntoView({behavior:'smooth', block:'start'});
  }

  renderQuestions();
</script>
</body>
</html>
